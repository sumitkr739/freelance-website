# Simple, high-performance automated deployment workflow for GitHub Pages
name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
      - master # Triggers on push to either main or master

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile and Build Static Assets
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy Compiled Assets to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder Vite builds into
          branch: gh-pages # The branch containing deployment static files
          clean: true
